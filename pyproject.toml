[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["agents/", "examples/", "references/"]

[tool.ruff.lint]
# E: pycodestyle errors, F: pyflakes, I: import sort, UP: pyupgrade,
# B: bugbear, SIM: simplify, RUF: ruff-specific.
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = [
  "E501",   # line too long — formatter handles
  "B008",   # function call in argument default — argparse uses this pattern
  "SIM105", # contextlib.suppress vs try/except — readability call
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_incomplete_defs = false
strict_optional = true
files = ["cli/cli.py"]
