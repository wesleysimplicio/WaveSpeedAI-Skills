name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck install.sh
          shellcheck cli/wavespeed-cli

  python:
    name: ruff + mypy + py_compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: ruff check
        run: ruff check cli/cli.py
      - name: ruff format check
        run: ruff format --check cli/cli.py
      - name: py_compile
        run: python -m py_compile cli/cli.py
      - name: mypy
        run: mypy --ignore-missing-imports cli/cli.py
        continue-on-error: true

  markdown:
    name: markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          use-verbose-mode: yes
          config-file: .github/markdown-link-check.json
        continue-on-error: true
